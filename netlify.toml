[build]
  command = "npm run build"
  publish = "dist"

# Vite build vaqtida yig‘iladi — prod’da /api prefiksi bilan mutlaq URL hosil bo‘ladi
[build.environment]
  VITE_API_BASE_URL = "https://api.the-kasb.uz"

# React Router (client-side): barcha yo‘llar index.html ga
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
